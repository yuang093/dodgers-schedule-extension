<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>洛杉磯道奇賽程</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="header">
        <h1 class="title">洛杉磯道奇賽程</h1>
        <div class="header-controls">
            <button class="theme-toggle" id="theme-toggle" title="切換深色/淺色模式">🌙</button>
            <button class="share-btn" id="share-btn" title="分享賽程">分享</button>
            <button class="reminder-btn" id="reminder-btn" title="設定比賽提醒">🔔</button>
            <button class="donate-btn" id="donate-btn" title="贊助支持">❤️ 斗內</button>
        </div>
        <div class="logo-container" id="logo-container"></div>
    </div>

    <!-- 戰績與倒數區 -->
    <div class="stats-bar">
        <div class="stats-left">
            <span class="stats-label">賽季戰績</span>
            <span class="stats-record" id="stats-record">--勝 --負</span>
        </div>
        <div class="stats-right">
            <span class="countdown-label" id="countdown-label">下一場</span>
            <span class="countdown-value" id="countdown">--:--:--</span>
        </div>
    </div>

    <!-- 排名區 -->
    <div class="standings-bar" id="standings-bar">
        <span class="standings-label">國聯西區</span>
        <span class="standings-rank" id="standings-rank">第--名</span>
        <span class="standings-record" id="standings-record">--勝 --負</span>
        <span class="standings-pct" id="standings-pct">.---</span>
    </div>

    <div class="time-info">
        <span class="time" id="current-time">
            <span>🕐</span>
            <span>載入中...</span>
        </span>
        <span class="update-info" id="update-info">--:--</span>
        <span class="offline-indicator" id="offline-indicator" style="display: none;">📴 離線模式</span>
    </div>

    <div class="schedule-container">
        <table id="schedule-table">
            <thead>
                <tr>
                    <th>日期</th>
                    <th>對手</th>
                    <th>時間</th>
                    <th>狀態</th>
                    <th>比數</th>
                    <th>局數</th>
                </tr>
            </thead>
            <tbody id="schedule-body">
                <tr>
                    <td colspan="6">
                        <div class="loading">
                            <div class="spinner"></div>
                            <span>正在載入賽程資料...</span>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <script src="popup.js"></script>
</body>
</html>
