<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>洛杉磯道奇賽程</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="header">
        <div class="title">
            <select id="team-selector" class="team-selector">
                <option value="119">洛杉磯道奇</option>
                <option value="147">紐約洋基</option>
                <option value="111">波士頓紅襪</option>
                <option value="112">芝加哥小熊</option>
                <option value="145">芝加哥白襪</option>
                <option value="137">舊金山巨人</option>
                <option value="121">紐約大都會</option>
                <option value="117">休士頓太空人</option>
                <option value="108">洛杉磯天使</option>
                <option value="143">費城費城人</option>
                <option value="144">亞特蘭大勇士</option>
                <option value="138">聖路易紅雀</option>
                <option value="141">多倫多藍鳥</option>
                <option value="142">明尼蘇達雙城</option>
                <option value="114">克利夫蘭守護者</option>
                <option value="136">西雅圖水手</option>
                <option value="139">坦帕灣光芒</option>
                <option value="140">德州遊騎兵</option>
                <option value="116">底特律老虎</option>
                <option value="110">巴爾的摩金鶯</option>
                <option value="158">密爾沃基釀酒人</option>
                <option value="135">聖地牙哥教士</option>
                <option value="113">辛辛那提紅人</option>
                <option value="134">匹茲堡海盜</option>
                <option value="133">奧克蘭運動家</option>
                <option value="118">堪薩斯城皇家</option>
                <option value="120">華盛頓國民</option>
                <option value="146">邁阿密馬林魚</option>
                <option value="109">亞利桑那響尾蛇</option>
                <option value="115">科羅拉多洛磯</option>
            </select>
        </div>
        <div class="header-controls">
            <button class="theme-toggle" id="theme-toggle" title="切換深色/淺色模式">🌙</button>
            <button class="share-btn" id="share-btn" title="分享賽程">分享</button>
            <button class="reminder-btn" id="reminder-btn" title="設定比賽提醒">🔔</button>
            <button class="donate-btn" id="donate-btn" title="贊助支持">❤️ 斗內</button>
        </div>
        <div class="logo-container" id="logo-container"></div>
    </div>

    <!-- 戰績與倒數區 -->
    <div class="stats-bar">
        <div class="stats-left">
            <span class="stats-label">賽季戰績</span>
            <span class="stats-record" id="stats-record">--勝 --負</span>
        </div>
        <div class="stats-right">
            <span class="countdown-label" id="countdown-label">下一場</span>
            <span class="countdown-value" id="countdown">--:--:--</span>
        </div>
    </div>

    <!-- 排名區 -->
    <div class="standings-bar" id="standings-bar">
        <span class="standings-label" id="standings-label">國聯西區</span>
        <span class="standings-rank" id="standings-rank">第--名</span>
        <span class="standings-record" id="standings-record">--勝 --負</span>
        <span class="standings-pct" id="standings-pct">.---</span>
    </div>

    <div class="time-info">
        <span class="time" id="current-time">
            <span>🕐</span>
            <span>載入中...</span>
        </span>
        <span class="update-info" id="update-info">--:--</span>
        <span class="offline-indicator" id="offline-indicator" style="display: none;">📴 離線模式</span>
    </div>

    <div class="schedule-container">
        <table id="schedule-table">
            <thead>
                <tr>
                    <th>日期</th>
                    <th>對手</th>
                    <th>時間</th>
                    <th>狀態</th>
                    <th>比數</th>
                    <th>局數</th>
                </tr>
            </thead>
            <tbody id="schedule-body">
                <tr>
                    <td colspan="6">
                        <div class="loading">
                            <div class="spinner"></div>
                            <span>正在載入賽程資料...</span>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <script src="popup.js"></script>
</body>
</html>
